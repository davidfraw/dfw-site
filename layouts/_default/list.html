{{ define "main" }}
<main>
  <div class="section-header">
    <h2>{{ .Title }}</h2>
  </div>
  <div class="article-list">
    {{ range .Pages }}
      <div class="article-item">
        <a href="{{ .Permalink }}">
          <span class="article-date">{{ .Date.Format "Jan 2006" }}</span>
          <div class="article-content">
            <div class="article-title">{{ .Title }}</div>
            <p class="article-desc">{{ .Summary | plainify | truncate 150 }}</p>
          </div>
        </a>
      </div>
    {{ end }}
  </div>
</main>
{{ end }}
